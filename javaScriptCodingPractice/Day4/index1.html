<body>
    <script>
        //unary operater
        let x=10;
        document.write("The value of x befor applying the unary operator: ", x)

        x=-x;
        document.write("<br/>The value of x after applying the unary operator: ", x)
    </script>

    <script>
        //binary operator
        let a=12, c=13 ,result;
        result=a+c;
        document.write("<br/>The sum of a and c is: ", result)
        document.write("<br/>The difference of a and c is: ",c-a);
        document.write("<br/>The product of a and c is: ",a*c);
        document.write("<br/>The quotient of a and c is: ",a/c);
        document.write("<br/>The remainder of a divided by c is: ",a%c);
        document.write("<br/>The power of a raised to the power of c is: ",a**c);
        document.write("<br/>The value of a raised to the power of c is: ",Math.pow(a,c));
    


    </script>
